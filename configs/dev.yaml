databento:
  api_key_env: DATABENTO_API_KEY
  dataset: GLBX.MDP3
  schema: ohlcv-1m
  stype_in: raw_symbol

market:
  symbol: MES
  bar_size: 5min
  session: RTH
  rth_start: "09:30"
  rth_end: "16:00"

data:
  raw_dir: data/raw
  processed_dir: data/processed

strategy:
  type: donchian
  lookback: 20
  atr_window: 14
  atr_multiple: 3.0

risk:
  max_contracts: 5
  max_trades_per_day: 10
  daily_loss_limit_pct: 0.02

execution:
  commission_round_turn: 1.50
  slippage_ticks: 1